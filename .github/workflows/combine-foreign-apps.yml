name: Combine package lists

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate output yml file
        run: |
          mkdir -p output
          > output/raw.txt

          # collect all txt files from your folder
          find foreign-android-apps/categories -name "*.txt" -exec cat {} + > output/raw.txt

          # clean + deduplicate
          cat output/raw.txt \
            | sed 's/\r//' \
            | sed '/^\s*$/d' \
            | sort \
            | uniq \
            > output/clean.txt

          # Build yml
          {
            echo "include-package:"
            sed 's/^/- /' output/clean.txt
          } > foreign-android-apps/include-android-apps-tun.yml

      - name: Show result
        run: |
          echo "Generated file:"
          cat foreign-android-apps/include-android-apps-tun.yml

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add foreign-android-apps/include-android-apps-tun.yml
          git commit -m "Update package YAML ruleset" || exit 0
          git push
